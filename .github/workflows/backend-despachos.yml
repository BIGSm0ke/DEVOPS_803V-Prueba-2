name: Backend Despachos CI/CD

on:
  push:
    branches: [deploy]
    paths:
      - "back-Despachos_SpringBoot/**"

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17 and cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build and test with Maven
        run: mvn clean verify -B
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/back-despachos:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: "DOCKER_USERNAME,DOCKER_PASSWORD,IMAGE_TAG,MYSQL_VENTAS_ROOT_PASSWORD,MYSQL_VENTAS_DATABASE,MYSQL_VENTAS_USER,MYSQL_VENTAS_PASSWORD,MYSQL_DESPACHOS_ROOT_PASSWORD,MYSQL_DESPACHOS_DATABASE,MYSQL_DESPACHOS_USER,MYSQL_DESPACHOS_PASSWORD"
          script: |
            echo "=== Actualizando repositorio en EC2 ==="
            cd ~/app
            git pull origin deploy

            echo "=== Autenticando en Docker Hub ==="
            echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin

            echo "=== Generando .env ==="
            cat > .env << EOF
            DOCKER_USERNAME=${DOCKER_USERNAME}
            IMAGE_TAG=${IMAGE_TAG}
            MYSQL_VENTAS_ROOT_PASSWORD=${MYSQL_VENTAS_ROOT_PASSWORD}
            MYSQL_VENTAS_DATABASE=${MYSQL_VENTAS_DATABASE}
            MYSQL_VENTAS_USER=${MYSQL_VENTAS_USER}
            MYSQL_VENTAS_PASSWORD=${MYSQL_VENTAS_PASSWORD}
            MYSQL_VENTAS_PORT=3307
            MYSQL_DESPACHOS_ROOT_PASSWORD=${MYSQL_DESPACHOS_ROOT_PASSWORD}
            MYSQL_DESPACHOS_DATABASE=${MYSQL_DESPACHOS_DATABASE}
            MYSQL_DESPACHOS_USER=${MYSQL_DESPACHOS_USER}
            MYSQL_DESPACHOS_PASSWORD=${MYSQL_DESPACHOS_PASSWORD}
            MYSQL_DESPACHOS_PORT=3308
            BACK_VENTAS_PORT=8080
            BACK_DESPACHOS_PORT=8081
            FRONTEND_PORT=80
            EOF

            echo "=== Descargando nuevas imagenes ==="
            docker compose pull

            echo "=== Reiniciando servicios ==="
            docker compose down
            docker compose up -d

            echo "=== Limpiando imagenes antiguas ==="
            docker image prune -f

            echo "=== Deploy completado ==="
